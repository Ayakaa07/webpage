<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      background: #f4f7f8;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 720px);
      background: #ffffff;
      border: 1px solid #d9e2e7;
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 16px 40px rgba(31, 41, 51, 0.08);
    }

    .profile {
      display: grid;
      gap: 24px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #2f6f73;
      color: #ffffff;
      display: grid;
      place-items: center;
      font-size: 32px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 6vw, 48px);
      line-height: 1.1;
    }

    .role {
      margin: 0;
      color: #52616b;
      font-size: 18px;
    }

    p {
      margin: 0;
      line-height: 1.8;
    }

    .section {
      border-top: 1px solid #e4ebef;
      padding-top: 24px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    ul {
      margin: 0;
      padding-left: 20px;
      line-height: 1.8;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding-top: 8px;
    }

    .links a {
      color: #ffffff;
      background: #2f6f73;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: 600;
    }

    .links a:hover {
      background: #24585b;
    }

    @media (max-width: 520px) {
      main {
        padding: 28px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="profile" aria-labelledby="name">
      <div class="avatar" aria-hidden="true">山</div>

      <header>
        <h1 id="name">山田 太郎</h1>
        <p class="role">Web制作とデザインが好きな学習者</p>
      </header>

      <p>
        はじめまして。シンプルで使いやすいWebサイトを作ることに興味があります。
        現在はHTML、CSS、JavaScriptを学びながら、自分の作品を少しずつ増やしています。
      </p>

      <div class="section">
        <h2>好きなこと</h2>
        <ul>
          <li>Webサイト制作</li>
          <li>写真を撮ること</li>
          <li>新しいツールを試すこと</li>
        </ul>
      </div>

      <div class="section">
        <h2>連絡先</h2>
        <p>お気軽にご連絡ください。</p>
        <div class="links">
          <a href="mailto:example@example.com">メール</a>
          <a href="https://github.com/" target="_blank" rel="noreferrer">GitHub</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
